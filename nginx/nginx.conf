# ── APEXIQ Nginx Config ───────────────────────────────────────────────────────
# Proxies all traffic to the NestJS backend container.
# AI service is internal-only (backend ↔ ai-service via Docker network).
#
# Before enabling HTTPS section: run certbot to obtain SSL certificates.
# See DEPLOYMENT.md §6 for instructions.

upstream backend {
    server backend:3000;
    keepalive 32;
}

# ── HTTP (redirect to HTTPS after cert is obtained) ──────────────────────────
server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (needed for cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once you have SSL, uncomment this and comment out the location block below
    # return 301 https://$host$request_uri;

    # Temporary: serve HTTP directly until SSL is configured
    include /etc/nginx/conf.d/proxy_params.conf;
    location / {
        proxy_pass http://backend;
    }
}

