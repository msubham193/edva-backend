version: '3.8'

# ── Production Compose — Single EC2 Instance ─────────────────────────────────
# Assumptions:
#   Backend repo cloned at : /home/ubuntu/apexiq-backend/apexiq/
#   AI service repo cloned  : /home/ubuntu/AI_Study/
#
# Run from: /home/ubuntu/apexiq-backend/apexiq/
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: apexiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-apexiq}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-apexiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apexiq-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Service (FastAPI) ────────────────────────────────────────────────────
  ai-service:
    build:
      context: ../../AI_Study
      dockerfile: Dockerfile
    container_name: apexiq-ai-service
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SERPAPI_KEY: ${SERPAPI_KEY}
      DJANGO_DEBUG: "false"
      ALLOWED_HOSTS: "ai-service,localhost,127.0.0.1"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-apexiq}
      DB_USER: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LLM_MODEL_FAST: ${LLM_MODEL_FAST:-llama-3.1-8b-instant}
      LLM_MODEL_BALANCED: ${LLM_MODEL_BALANCED:-llama-3.3-70b-versatile}
      LLM_MODEL_POWER: ${LLM_MODEL_POWER:-llama-3.3-70b-versatile}
      USAGE_SOFT_CAP_TOKENS: ${USAGE_SOFT_CAP_TOKENS:-500000}
      USAGE_HARD_CAP_TOKENS: ${USAGE_HARD_CAP_TOKENS:-1000000}
      AI_API_KEY: ${AI_API_KEY}
      POPPLER_PATH: ""
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Backend (NestJS) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apexiq-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-apexiq}
      DB_SYNC: "false"
      DB_LOGGING: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TTL: ${REDIS_TTL:-3600}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      OTP_EXPIRES_IN_SECONDS: ${OTP_EXPIRES_IN_SECONDS:-300}
      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_DEV_MODE: "false"
      AI_BASE_URL: http://ai-service:8000
      AI_API_KEY: ${AI_API_KEY}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-30000}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: apexiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_www:
  certbot_conf:
